<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{ /*
            Box level
            */
          background-color: lightgray;
          height: 300px;
         width: 300px;
        padding: 10px 20px;
        margin: 20px auto 40px auto;
         outline-width: 5px;
          outline-style: dashed;
          outline-color: salmon;
        }
        a{ /*  inline level*/
           border: 10px solid slategray;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
     <p>Páragrafos tambem são exemplo de box-level, mas os <a href="#">Links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona </p> 

</body>
</html>
