<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em html 5</title>
</head>
<body>
    <h1>imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente ou diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 700px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1000px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    
    <h2>Reproduzindo audio</h2>
    <p>vamos aprender a reproduzir audios em HTML5</p>
    <audio preload="metadata" autoplay controls >
        <source src="midia/southparktheme.weba" type="audio/mpeg">
        <source src="midia/southparktheme.ogg" type="audio/ogg">
        <source src="midia/southparktheme.wav" type="audio/wav">
        <p>Infelizmente seu navegador nao consegue produzir audio. <a href="midia/southparktheme.weba">clique aqui para baixar o arquivo mp3</a></p>
    </audio>
    <!--Compativeis=MP3, WAV, OGG-->
</body>
</html>
